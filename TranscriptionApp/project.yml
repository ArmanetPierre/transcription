name: TranscriptionApp
options:
  bundleIdPrefix: com.pierre
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_LANGUAGE: en

targets:
  TranscriptionApp:
    type: application
    platform: macOS
    sources:
      - TranscriptionApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pierre.Voxa
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: Voxa
        CODE_SIGN_ENTITLEMENTS: TranscriptionApp/Resources/TranscriptionApp.entitlements
        ENABLE_APP_SANDBOX: false
        PRODUCT_NAME: Voxa
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Voxa uses the microphone to record your voice during meetings."
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
